<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Words · A new word every day</title>
<meta name="description" content="Learn a new word every day. A deterministic word-of-the-day that refreshes automatically at midnight.">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1c2230;
    --line: rgba(255,255,255,0.08);
    --ink: #eef2f7;
    --muted: #9aa6b6;
    --accent: #f2b447;
    --accent-soft: rgba(242,180,71,0.14);
    --good: #58c98a;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f6f3ec; --panel: #ffffff; --panel-2: #faf7f0;
      --line: rgba(0,0,0,0.09); --ink: #1b1f26; --muted: #6b7280;
      --accent: #b7791f; --accent-soft: rgba(183,121,31,0.12); --good: #2f9e6a;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--ink); font-family: 'Inter', system-ui, sans-serif;
    font-weight: 400; line-height: 1.6; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 2rem 1.25rem 3rem;
    background-image: radial-gradient(ellipse 60% 50% at 50% -5%, var(--accent-soft), transparent 70%);
  }
  header { width: 100%; max-width: 680px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; }
  .brand { display: flex; align-items: center; gap: 0.6rem; font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.15rem; letter-spacing: 0.01em; }
  .brand-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
  .today-date { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; }

  main { width: 100%; max-width: 680px; }
  .card {
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--line); border-radius: 20px;
    padding: 2.5rem 2.25rem; position: relative; overflow: hidden;
    box-shadow: 0 20px 50px -30px rgba(0,0,0,0.5);
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .eyebrow { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 1.25rem; }
  .eyebrow::before { content: ''; width: 18px; height: 1.5px; background: var(--accent); display: block; }

  .word-row { display: flex; align-items: baseline; flex-wrap: wrap; gap: 0.75rem 1rem; }
  .word { font-family: 'Fraunces', serif; font-size: clamp(2.6rem, 8vw, 4rem); font-weight: 600; line-height: 1.02; letter-spacing: -0.01em; }
  .pos { font-size: 0.8rem; font-style: italic; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 0.2rem 0.7rem; align-self: center; }
  .phonetic { font-family: 'Fraunces', serif; font-style: italic; color: var(--muted); font-size: 1.05rem; margin-top: 0.4rem; }

  .definition { font-size: 1.2rem; line-height: 1.55; margin: 1.6rem 0 1.25rem; }
  .example { font-family: 'Fraunces', serif; font-style: italic; font-size: 1.05rem; color: var(--ink); opacity: 0.9; padding-left: 1rem; border-left: 2px solid var(--accent); }

  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.75rem; }
  @media (max-width: 520px) { .meta-grid { grid-template-columns: 1fr; } }
  .meta-box { background: var(--bg); border: 1px solid var(--line); border-radius: 12px; padding: 1rem 1.1rem; }
  .meta-label { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 0.4rem; }
  .meta-value { font-size: 0.92rem; line-height: 1.5; }
  .syn { display: inline-block; background: var(--accent-soft); color: var(--accent); border-radius: 999px; padding: 0.15rem 0.6rem; font-size: 0.8rem; margin: 0.15rem 0.3rem 0.15rem 0; font-weight: 500; }

  .auto-note { display: flex; align-items: center; gap: 0.55rem; font-size: 0.78rem; color: var(--muted); margin-top: 1.75rem; }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--good); box-shadow: 0 0 0 0 var(--good); animation: pulse 2.2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(88,201,138,0.5); } 70% { box-shadow: 0 0 0 8px rgba(88,201,138,0); } 100% { box-shadow: 0 0 0 0 rgba(88,201,138,0); } }

  .archive { margin-top: 2.5rem; }
  .archive h2 { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; color: var(--muted); }
  .archive-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .archive-item { display: flex; align-items: baseline; gap: 0.8rem; padding: 0.7rem 1rem; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); }
  .archive-day { font-size: 0.7rem; color: var(--muted); width: 92px; flex-shrink: 0; letter-spacing: 0.04em; }
  .archive-word { font-family: 'Fraunces', serif; font-weight: 600; }
  .archive-def { font-size: 0.85rem; color: var(--muted); margin-left: auto; text-align: right; max-width: 55%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  @media (max-width: 520px) { .archive-def { display: none; } }

  footer { margin-top: 3rem; font-size: 0.78rem; color: var(--muted); text-align: center; line-height: 1.7; }
  footer a { color: var(--accent); text-decoration: none; }
  .loading { text-align: center; color: var(--muted); padding: 3rem 0; }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="brand-dot"></span>Daily Words</div>
  <div class="today-date" id="todayDate">—</div>
</header>

<main>
  <div class="card" id="card">
    <div class="loading">Loading today's word…</div>
  </div>

  <section class="archive" id="archive" hidden>
    <h2>Recent days</h2>
    <div class="archive-list" id="archiveList"></div>
  </section>
</main>

<footer>
  A new word appears automatically every day at midnight (UTC).<br>
  Word selection is deterministic — everyone sees the same word on the same date.
</footer>

<script>
(async function () {
  const EPOCH = Date.UTC(2024, 0, 1); // fixed reference day
  const DAY_MS = 86400000;

  // Day index: whole days since epoch, in UTC, so midnight-UTC rollover is crisp.
  function dayIndexFor(date) {
    const utcMidnight = Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate());
    return Math.floor((utcMidnight - EPOCH) / DAY_MS);
  }

  function fmtDate(date) {
    return date.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }

  async function loadData() {
    // The master list is the source of truth (needed for the archive + fallback).
    const r2 = await fetch('words.json', { cache: 'no-store' });
    if (!r2.ok) throw new Error('Could not load word list');
    const master = await r2.json();

    // Overlay the CI-published snapshot for the headline word, when available.
    let today = null;
    try {
      const r = await fetch('today.json', { cache: 'no-store' });
      if (r.ok) {
        const t = await r.json();
        // Snapshot shape is { date, dayIndex, word: {…} }; unwrap the entry.
        const entry = t && t.word && typeof t.word === 'object' ? t.word : t;
        if (entry && entry.word && entry.definition) today = entry;
      }
    } catch (_) {}

    return { words: master.words, today };
  }

  function render(entry, date) {
    const syns = (entry.synonyms || []).map(s => `<span class="syn">${s}</span>`).join('');
    document.getElementById('card').innerHTML = `
      <div class="eyebrow">Word of the Day</div>
      <div class="word-row">
        <h1 class="word">${entry.word}</h1>
        <span class="pos">${entry.pos || ''}</span>
      </div>
      ${entry.phonetic ? `<div class="phonetic">${entry.phonetic}</div>` : ''}
      <p class="definition">${entry.definition}</p>
      ${entry.example ? `<p class="example">${entry.example}</p>` : ''}
      <div class="meta-grid">
        ${entry.origin ? `<div class="meta-box"><div class="meta-label">Origin</div><div class="meta-value">${entry.origin}</div></div>` : ''}
        ${syns ? `<div class="meta-box"><div class="meta-label">Synonyms</div><div class="meta-value">${syns}</div></div>` : ''}
      </div>
      <div class="auto-note"><span class="pulse"></span>Refreshes automatically at 00:00 UTC · Day #${dayIndexFor(date)}</div>
    `;
  }

  function renderArchive(words, date) {
    const list = document.getElementById('archiveList');
    const idxToday = dayIndexFor(date);
    let html = '';
    for (let back = 1; back <= 5; back++) {
      const d = new Date(date.getTime() - back * DAY_MS);
      const w = words[((idxToday - back) % words.length + words.length) % words.length];
      html += `<div class="archive-item">
        <span class="archive-day">${d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}</span>
        <span class="archive-word">${w.word}</span>
        <span class="archive-def">${w.definition}</span>
      </div>`;
    }
    list.innerHTML = html;
    document.getElementById('archive').hidden = false;
  }

  try {
    const now = new Date();
    document.getElementById('todayDate').textContent = fmtDate(now);
    const { words, today } = await loadData();

    const idx = ((dayIndexFor(now) % words.length) + words.length) % words.length;
    const entry = today || words[idx];
    renderArchive(words, now);
    render(entry, now);
  } catch (err) {
    document.getElementById('card').innerHTML =
      `<div class="loading">Couldn't load today's word.<br><small>${err.message}</small></div>`;
  }
})();
</script>
</body>
</html>
